<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Note document with Microsoft Dynamics 365 purple branding -->
  
  <!-- Document shadow -->
  <rect x="10" y="6" width="42" height="54" rx="3" fill="#5a1a5a" opacity="0.15"/>
  
  <!-- Main document body -->
  <rect x="7" y="3" width="42" height="54" rx="3" fill="#fefefe" stroke="#742774" stroke-width="2.5"/>
  
  <!-- Folded corner -->
  <path d="M37 3 L49 3 L49 15 Z" fill="#e8d5e8" stroke="#742774" stroke-width="2" stroke-linejoin="round"/>
  <path d="M37 3 L37 15 L49 15" fill="#f3e8f3" stroke="#742774" stroke-width="2" stroke-linejoin="round"/>
  
  <!-- Purple accent bar at top -->
  <rect x="7" y="3" width="30" height="6" rx="3" fill="#742774"/>
  <rect x="7" y="6" width="30" height="3" fill="#742774"/>
  
  <!-- Text lines - Dynamics purple tinted -->
  <line x1="14" y1="18" x2="38" y2="18" stroke="#742774" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="14" y1="25" x2="42" y2="25" stroke="#742774" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="14" y1="32" x2="36" y2="32" stroke="#742774" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="14" y1="39" x2="40" y2="39" stroke="#742774" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="14" y1="46" x2="30" y2="46" stroke="#742774" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  
  <!-- Dynamics-style accent: purple circle with checkmark -->
  <circle cx="52" cy="48" r="10" fill="#742774" stroke="#fefefe" stroke-width="2"/>
  <path d="M47 48 L50.5 51.5 L57 44.5" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
