<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Solid purple note document - Dynamics 365 branding -->
  
  <!-- Document shadow -->
  <rect x="10" y="6" width="42" height="54" rx="3" fill="#3a0e3a" opacity="0.3"/>
  
  <!-- Main document body - solid purple -->
  <rect x="7" y="3" width="42" height="54" rx="3" fill="#742774"/>
  
  <!-- Folded corner -->
  <path d="M37 3 L49 3 L49 15 Z" fill="#5a1d5a"/>
  <path d="M37 3 L37 15 L49 15" fill="#9b4d9b"/>
  
  <!-- Text lines - white -->
  <line x1="14" y1="16" x2="36" y2="16" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="14" y1="23" x2="42" y2="23" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="14" y1="30" x2="34" y2="30" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="14" y1="37" x2="40" y2="37" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="14" y1="44" x2="28" y2="44" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>
  
  <!-- Accent circle with dollar sign -->
  <circle cx="52" cy="48.25" r="10" fill="white"/>
  <text x="52" y="55" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#198754">$</text>
</svg>
