<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Placeholder SB monogram - will be replaced with actual vector from designer -->
  <defs>
    <linearGradient id="sbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#27C3B3"/>
      <stop offset="100%" stop-color="#2A86D1"/>
    </linearGradient>
    <clipPath id="roundClip">
      <rect x="2" y="2" width="60" height="60" rx="14"/>
    </clipPath>
  </defs>
  <!-- Rounded square background -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#sbGrad)"/>
  <!-- S letter -->
  <text x="22" y="46" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="bold" font-style="italic" fill="white" opacity="0.95">S</text>
  <!-- B letter overlapping -->
  <text x="32" y="46" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="bold" font-style="italic" fill="white" opacity="0.8">B</text>
</svg>
