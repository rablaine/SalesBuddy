{% extends "base.html" %}
{% block title %}{{ 'Edit' if project else 'New' }} Project - Sales Buddy{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1><i class="bi bi-folder"></i> {{ 'Edit' if project else 'New' }} Project</h1>
</div>

<form method="POST" class="card">
    <div class="card-body">
        {% with flyout_mode=False %}
        {% include 'partials/_project_form_fields.html' %}
        {% endwith %}
    </div>
    <div class="card-footer d-flex justify-content-between">
        <a href="{{ url_for('projects.project_view', id=project.id) if project else url_for('engagements.engagements_hub') }}" class="btn btn-outline-secondary">Cancel</a>
        <button type="submit" class="btn btn-primary"><i class="bi bi-check-circle"></i> {{ 'Save' if project else 'Create' }}</button>
    </div>
</form>
{% endblock %}
